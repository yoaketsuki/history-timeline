<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歷史整理年表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #fdf6e9;
  --bg-alt:   #f5ead2;
  --bg-card:  #fffcf4;
  --accent:   #b8832a;
  --accent-lt:#f0e0b8;
  --tw:       #2a6b5f;
  --tw-bg:    #edf5f2;
  --tw-lt:    #c8e6df;
  --cn:       #8b2525;
  --cn-bg:    #fdf0ee;
  --cn-lt:    #f0c8c5;
  --world:    #2a4a7f;
  --world-bg: #eff2fa;
  --world-lt: #c5d0ee;
  --text:     #2a2a20;
  --muted:    #7a7060;
  --border:   #dcd0b0;
  --border-lt:#eee5cc;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.75;
}

/* ── AUTH ────────────────────────────────── */
#auth{position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;align-items:center;justify-content:center}
.auth-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:12px;padding:48px 44px;text-align:center;width:320px;
  box-shadow:0 4px 24px rgba(80,50,0,.09);
}
.auth-title{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;
  letter-spacing:.06em;color:var(--text);margin-bottom:6px}
.auth-sub{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:13px;color:var(--muted);margin-bottom:28px}
.auth-note{font-size:11px;color:var(--muted);margin-top:16px;line-height:1.5}
#pass-input{
  width:100%;padding:10px 14px;border:1.5px solid var(--border);
  border-radius:8px;background:var(--bg);font-size:14px;
  font-family:inherit;color:var(--text);outline:none;text-align:center;
  transition:border-color .15s;margin-bottom:12px;letter-spacing:.2em;
}
#pass-input:focus{border-color:var(--accent)}
#pass-btn{
  width:100%;padding:10px;border:none;border-radius:8px;
  background:var(--accent);color:#fff;font-size:14px;font-weight:500;
  font-family:inherit;cursor:pointer;transition:opacity .15s;
}
#pass-btn:hover{opacity:.88}
#pass-err{font-size:12px;color:#c0392b;margin-top:8px;display:none}

/* ── HEADER ─────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:200;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 12px rgba(60,40,0,0.07);
}
.hdr-top{
  max-width:1280px;margin:0 auto;
  padding:18px 24px 14px;
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
}
.title-block{flex-shrink:0}
.title-main{
  font-family:'Noto Serif TC',serif;
  font-size:22px;font-weight:700;
  color:var(--text);letter-spacing:.06em;
}
.title-sub{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:13px;
  color:var(--muted);margin-left:8px;
}
.hdr-nav{display:flex;gap:4px;margin-left:auto}
.nav-btn{
  padding:6px 16px;border-radius:16px;border:1.5px solid var(--border);
  background:transparent;font-size:13px;font-family:inherit;
  color:var(--muted);cursor:pointer;text-decoration:none;
  display:inline-flex;align-items:center;gap:4px;transition:all .15s;
}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn.active{border-color:var(--accent);background:var(--accent-lt);color:var(--accent);font-weight:500}
.search-wrap{flex:1;min-width:180px;max-width:340px;position:relative}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
#search{
  width:100%;padding:8px 14px 8px 34px;
  border:1.5px solid var(--border);border-radius:20px;
  background:var(--bg-card);font-size:13px;color:var(--text);
  outline:none;transition:border-color .15s;
  font-family:inherit;
}
#search:focus{border-color:var(--accent)}
.tracks{display:flex;gap:6px;align-items:center}
.track-btn{
  padding:6px 14px;border-radius:14px;
  border:1.5px solid var(--border);background:var(--bg-card);
  font-size:12.5px;cursor:pointer;
  font-family:inherit;color:var(--muted);
  transition:all .15s;white-space:nowrap;
}
.track-btn.on-all{border-color:var(--accent);background:var(--accent-lt);color:var(--accent);font-weight:500}
.track-btn.on-tw{border-color:var(--tw);background:var(--tw-bg);color:var(--tw);font-weight:500}
.track-btn.on-cn{border-color:var(--cn);background:var(--cn-bg);color:var(--cn);font-weight:500}
.track-btn.on-world{border-color:var(--world);background:var(--world-bg);color:var(--world);font-weight:500}
.track-btn:hover{opacity:.8}

/* Century nav */
.century-nav{
  max-width:1280px;margin:0 auto;
  padding:5px 24px;
  display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;
  border-top:1px solid var(--border-lt);
}
.century-nav::-webkit-scrollbar{display:none}
.century-btn{
  padding:3px 10px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg-card);font-size:11px;color:var(--muted);
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:all .12s;font-family:'Noto Sans TC',sans-serif;
}
.century-btn:hover{border-color:var(--accent);color:var(--accent)}
.century-btn.active{border-color:var(--accent);background:var(--accent-lt);color:var(--accent);font-weight:600}

/* ── ERA NAV ─────────────────────────────── */
.era-nav{
  max-width:1280px;margin:0 auto;
  padding:0 24px;
  display:flex;gap:0;overflow-x:auto;scrollbar-width:none;
  border-top:1px solid var(--border-lt);
}
.era-nav::-webkit-scrollbar{display:none}
.era-btn{
  padding:9px 16px;border:none;background:transparent;
  font-size:13px;color:var(--muted);cursor:pointer;
  white-space:nowrap;border-bottom:2px solid transparent;
  transition:all .15s;
  font-family:'Noto Serif TC',serif;
}
.era-btn:hover{color:var(--text)}
.era-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.era-btn .cnt{font-size:10px;color:var(--muted);margin-left:3px;font-family:'Noto Sans TC',sans-serif}

/* ── MAIN ─────────────────────────────────── */
.main{max-width:1280px;margin:0 auto;padding:28px 24px 80px}

/* Stats */
.stats{
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  margin-bottom:20px;font-size:12.5px;color:var(--muted);
}
.stats .num{font-weight:600;color:var(--text)}
.legend{display:flex;gap:14px;margin-left:auto}
.legend-item{display:flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-tw{background:var(--tw)}
.dot-cn{background:var(--cn)}
.dot-world{background:var(--world)}

/* Era section */
.era-sec{margin-bottom:52px}
.era-sec[hidden]{display:none}
.era-hd{
  display:flex;align-items:baseline;gap:12px;
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:1.5px solid var(--border);
}
.era-hd-num{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:36px;font-weight:600;
  color:var(--accent-lt);line-height:1;
  letter-spacing:-.02em;min-width:40px;text-align:right;
}
.era-hd-name{
  font-family:'Noto Serif TC',serif;
  font-size:18px;font-weight:700;
  color:var(--text);letter-spacing:.05em;
}
.era-hd-range{font-size:12px;color:var(--muted);margin-left:2px}
.era-hd-cnt{font-size:12px;color:var(--muted);margin-left:auto}

/* Col headers */
.col-hds{
  display:grid;
  grid-template-columns:110px 1fr 1fr 1fr;
  gap:0;margin-bottom:4px;
  font-size:12px;font-weight:500;
}
.col-hd{padding:4px 12px}
.col-hd.tw{color:var(--tw)}
.col-hd.cn{color:var(--cn)}
.col-hd.world{color:var(--world)}

/* Entry */
.entry{
  display:grid;
  grid-template-columns:110px 1fr 1fr 1fr;
  gap:0;
  margin-bottom:2px;
  border:1px solid var(--border-lt);
  border-radius:6px;overflow:hidden;
  background:var(--bg-card);
  transition:box-shadow .15s;
}
.entry:nth-child(even){background:var(--bg)}
.entry:hover{box-shadow:0 2px 10px rgba(80,50,0,0.09);z-index:1;position:relative}
.entry[hidden]{display:none}
.entry.found{background:#fffbe6;border-color:#e0c040}

/* Year cell */
.e-year{
  padding:12px 10px;
  border-right:1px solid var(--border-lt);
  background:var(--bg-alt);
  display:flex;flex-direction:column;gap:4px;
  justify-content:flex-start;
}
.year-raw{font-size:12px;font-weight:600;color:var(--text);line-height:1.3}
.dynasty-tag{
  display:inline-block;
  padding:1px 6px;border-radius:3px;
  font-size:10px;font-family:'Noto Serif TC',serif;
  background:var(--accent-lt);color:var(--accent);
  white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;
}

/* Track cells */
.e-tw,.e-cn,.e-world{
  padding:12px 14px;
  border-right:1px solid var(--border-lt);
  font-size:13px;line-height:1.75;
  vertical-align:top;min-height:52px;
}
.e-world{border-right:none}
.e-tw{background:inherit}
.e-tw.has{background:var(--tw-bg)}
.e-cn.has{background:var(--cn-bg)}
.e-world.has{background:var(--world-bg)}
.e-tw.hide,.e-cn.hide,.e-world.hide{display:none}

/* Mark highlight */
mark{background:#fff176;color:inherit;padding:0 1px;border-radius:2px}

/* Empty state */
.empty-state{text-align:center;padding:60px;color:var(--muted);font-size:15px}

/* Back to top */
.back-top{
  position:fixed;bottom:28px;right:28px;
  width:40px;height:40px;border-radius:50%;
  background:var(--text);color:var(--bg);
  border:none;font-size:18px;cursor:pointer;
  opacity:0;transition:opacity .25s;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.18);
}
.back-top.show{opacity:.75}
.back-top:hover{opacity:1}

/* No col headers on mobile */
@media(max-width:740px){
  .hdr-top{padding:14px 16px 10px;gap:12px}
  .era-nav{padding:0 16px}
  .main{padding:20px 12px 60px}
  .col-hds{display:none}
  .entry{grid-template-columns:80px 1fr}
  .e-tw,.e-cn,.e-world{border-right:none;border-top:1px solid var(--border-lt)}
  .entry{grid-template-columns:1fr}
  .e-year{border-right:none;border-bottom:1px solid var(--border-lt);flex-direction:row;gap:8px;align-items:center}
  .title-sub{display:none}
  .tracks{gap:4px}
  .track-btn{padding:5px 10px;font-size:11.5px}
  .search-wrap{max-width:none}
}
</style>
</head>
<body>

<div id="auth">
  <div class="auth-card">
    <div class="auth-title">歷史整理年表</div>
    <div class="auth-sub">Taiwan · China · World</div>
    <input id="pass-input" type="password" placeholder="密碼" autocomplete="off">
    <button id="pass-btn" onclick="submitPass()">進入</button>
    <div id="pass-err">密碼錯誤，請再試一次</div>
    <p class="auth-note">本資料由學生自主整理，僅供內部學習使用</p>
  </div>
</div>

<header class="hdr" id="main-hdr" style="display:none">
  <div class="hdr-top">
    <div class="title-block">
      <span class="title-main">歷史整理年表</span>
      <span class="title-sub">Taiwan · China · World</span>
    </div>
    <div class="search-wrap">
      <span class="search-ico">&#9906;</span>
      <input id="search" type="text" placeholder="搜尋事件、人物、年代…" autocomplete="off">
    </div>
    <div class="tracks">
      <button class="track-btn on-all" id="track-all-btn" onclick="resetTracks()">全部</button>
      <button class="track-btn on-tw" data-t="tw">🏝 台灣</button>
      <button class="track-btn on-cn" data-t="cn">🐉 中國</button>
      <button class="track-btn on-world" data-t="world">🌍 世界</button>
    </div>
    <nav class="hdr-nav">
      <span class="nav-btn active">📅 年表</span>
      <a href="map.html" class="nav-btn">🗺 地圖</a>
    </nav>
  </div>
  <nav class="century-nav" id="century-nav"></nav>
  <nav class="era-nav" id="era-nav"></nav>
</header>

<main class="main" id="main" style="display:none">
  <div class="stats">
    顯示 <span class="num" id="vis-count">0</span> 筆 ／ 共 <span class="num" id="total-count">0</span> 筆
    <div class="legend">
      <div class="legend-item"><span class="dot dot-tw"></span> 台灣</div>
      <div class="legend-item"><span class="dot dot-cn"></span> 中國</div>
      <div class="legend-item"><span class="dot dot-world"></span> 世界</div>
    </div>
  </div>
  <div id="timeline"></div>
</main>

<button class="back-top" id="back-top" onclick="scrollTo({top:0,behavior:'smooth'})" style="display:none">↑</button>

<script>
const PASSWORD = 'fhsh'; // ← 在這裡修改密碼

function checkAuth(){
  if(sessionStorage.getItem('hist_auth')==='1') showApp();
}
function submitPass(){
  const v = document.getElementById('pass-input').value;
  if(v===PASSWORD){
    sessionStorage.setItem('hist_auth','1');
    showApp();
  } else {
    document.getElementById('pass-err').style.display='block';
    document.getElementById('pass-input').value='';
    document.getElementById('pass-input').focus();
  }
}
function centuryLabel(c){
  if(c==='ancient') return '遠古';
  if(c<0) return '前'+(-c)+'世紀';
  return c+'世紀';
}

function buildCenturyNav(){
  const nav = document.getElementById('century-nav');
  nav.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'century-btn active';
  all.textContent = '全部年代';
  all.dataset.c = 'all';
  all.onclick = () => setCentury('all');
  nav.appendChild(all);
  CENTURIES.forEach(({c, n}) => {
    const b = document.createElement('button');
    b.className = 'century-btn';
    b.dataset.c = String(c);
    b.innerHTML = centuryLabel(c) + ' <span style="opacity:.55;font-size:10px">' + n + '</span>';
    b.onclick = () => setCentury(c);
    nav.appendChild(b);
  });
}

function setCentury(c){
  activeCentury = c;
  document.querySelectorAll('.century-btn').forEach(b => b.classList.toggle('active', b.dataset.c === String(c)));
  render();
  if(c !== 'all'){
    const first = document.querySelector('.entry:not([hidden])');
    if(first) first.scrollIntoView({behavior:'smooth', block:'start'});
  } else {
    scrollTo({top:0, behavior:'smooth'});
  }
}

function resetTracks(){
  activeTracks = {tw:true, cn:true, world:true};
  document.querySelectorAll('.track-btn[data-t]').forEach(b => {
    b.className = 'track-btn on-' + b.dataset.t;
  });
  syncTrackAll();
  render();
}

function syncTrackAll(){
  const allOn = activeTracks.tw && activeTracks.cn && activeTracks.world;
  const btn = document.getElementById('track-all-btn');
  if(btn) btn.className = 'track-btn' + (allOn ? ' on-all' : '');
}

function showApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('main-hdr').style.display='block';
  document.getElementById('main').style.display='block';
  document.getElementById('back-top').style.display='flex';
  buildCenturyNav();
  buildEraNav();
  render();
}
document.getElementById('pass-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitPass()});

  '秦漢':'西元前 221 — 220 年',
  '魏晉南北朝':'220 — 589 年',
  '隋唐':'589 — 907 年',
  '宋元':'907 — 1368 年',
  '明':'1368 — 1644 年',
  '清':'1644 — 1912 年',
  '近代':'1912 — 1945 年',
  '現代':'1945 年至今',
  '其他':'',
};
const COUNTS = {"史前": 20, "夏商周": 72, "秦漢": 45, "魏晉南北朝": 39, "隋唐": 45, "宋元": 64, "明": 28, "清": 116, "現代": 82};
const CENTURIES = [{"c": "ancient", "n": 20}, {"c": -1, "n": 12}, {"c": -2, "n": 11}, {"c": -3, "n": 5}, {"c": -4, "n": 14}, {"c": -5, "n": 15}, {"c": -6, "n": 12}, {"c": -7, "n": 4}, {"c": -8, "n": 5}, {"c": -9, "n": 1}, {"c": -10, "n": 1}, {"c": -12, "n": 5}, {"c": -13, "n": 1}, {"c": -14, "n": 2}, {"c": -15, "n": 1}, {"c": -16, "n": 2}, {"c": -17, "n": 1}, {"c": -18, "n": 1}, {"c": -19, "n": 3}, {"c": -20, "n": 2}, {"c": -21, "n": 2}, {"c": 1, "n": 9}, {"c": 2, "n": 6}, {"c": 3, "n": 11}, {"c": 4, "n": 11}, {"c": 5, "n": 10}, {"c": 6, "n": 11}, {"c": 7, "n": 12}, {"c": 8, "n": 18}, {"c": 9, "n": 12}, {"c": 10, "n": 16}, {"c": 11, "n": 12}, {"c": 12, "n": 8}, {"c": 13, "n": 20}, {"c": 14, "n": 18}, {"c": 16, "n": 9}, {"c": 17, "n": 44}, {"c": 18, "n": 41}, {"c": 19, "n": 41}, {"c": 20, "n": 49}, {"c": 21, "n": 18}, {"c": 3345, "n": 1}, {"c": 5076, "n": 1}, {"c": 113013, "n": 1}, {"c": 113912, "n": 1}, {"c": 115613, "n": 1}, {"c": 118013, "n": 1}, {"c": 128114, "n": 1}, {"c": 161017, "n": 1}, {"c": 161317, "n": 1}, {"c": 161917, "n": 1}, {"c": 180519, "n": 1}, {"c": 180719, "n": 1}, {"c": 181019, "n": 1}, {"c": 184220, "n": 1}, {"c": 185920, "n": 1}];

let activeEra = 'all';
let activeCentury = 'all';
let activeTracks = {tw:true, cn:true, world:true};
let searchQ = '';
let visCount = DATA.length;

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function highlight(text, q){
  if(!q||!text) return esc(text);
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<mark>$1</mark>');
}

function buildEntry(e, q){
  const div = document.createElement('div');
  div.className = 'entry';
  div.dataset.period = e.period;
  div.dataset.tw = e.tw ? '1' : '';
  div.dataset.cn = e.cn ? '1' : '';
  div.dataset.world = e.world ? '1' : '';

  const hasTw = e.tw && activeTracks.tw;
  const haCn = e.cn && activeTracks.cn;
  const haWo = e.world && activeTracks.world;

  const matched = !q || [e.tw, e.cn, e.world, e.year_raw, e.era].some(t => t && t.toLowerCase().includes(q.toLowerCase()));
  const yr = e.year;
  let ec;
  if(yr < -2100) ec = 'ancient';
  else if(yr >= 0) ec = Math.floor(yr/100)+1;
  else ec = -(Math.floor((-yr-1)/100)+1);
  const inCentury = activeCentury === 'all' || String(ec) === String(activeCentury);
  if(!matched || !inCentury){ div.hidden = true; }
  if(q && matched && inCentury) div.classList.add('found');

  const tag = e.era ? `<span class="dynasty-tag" title="${esc(e.era)}">${esc(e.era)}</span>` : '';

  div.innerHTML = `
    <div class="e-year">
      <div class="year-raw">${esc(e.year_raw)}</div>
      ${tag}
    </div>
    <div class="e-tw ${e.tw?'has':''} ${activeTracks.tw?'':'hide'}">${highlight(e.tw, q)}</div>
    <div class="e-cn ${e.cn?'has':''} ${activeTracks.cn?'':'hide'}">${highlight(e.cn, q)}</div>
    <div class="e-world ${e.world?'has':''} ${activeTracks.world?'':'hide'}">${highlight(e.world, q)}</div>
  `;
  return div;
}

function buildColHd(){
  const d = document.createElement('div');
  d.className = 'col-hds';
  d.innerHTML = `<div class="col-hd">年代 / 朝代</div>
    <div class="col-hd tw ${activeTracks.tw?'':'hide'}">🏝 台灣</div>
    <div class="col-hd cn ${activeTracks.cn?'':'hide'}">🐉 中國</div>
    <div class="col-hd world ${activeTracks.world?'':'hide'}">🌍 世界</div>`;
  return d;
}

function render(){
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  let total = DATA.length;
  let vis = 0;
  const q = searchQ;

  PERIOD_ORDER.forEach((period, idx) => {
    const indices = GROUPS[period] || [];
    if(!indices.length) return;
    if(activeEra !== 'all' && activeEra !== period) return;

    const sec = document.createElement('div');
    sec.className = 'era-sec';
    sec.id = 'era-'+period;

    const hd = document.createElement('div');
    hd.className = 'era-hd';
    hd.innerHTML = `
      <div class="era-hd-num">${String(idx+1).padStart(2,'0')}</div>
      <div class="era-hd-name">${period}</div>
      <div class="era-hd-range">${PERIOD_RANGES[period]||''}</div>
      <div class="era-hd-cnt">${indices.length} 筆</div>
    `;
    sec.appendChild(hd);
    sec.appendChild(buildColHd());

    let secVis = 0;
    indices.forEach(i => {
      const el = buildEntry(DATA[i], q);
      if(!el.hidden) secVis++;
      sec.appendChild(el);
    });
    vis += secVis;

    if(q && secVis === 0) sec.hidden = true;
    tl.appendChild(sec);
  });

  if(tl.children.length === 0 || vis === 0){
    tl.innerHTML = '<div class="empty-state">沒有找到符合的結果<br><small>試試其他關鍵字</small></div>';
  }

  document.getElementById('vis-count').textContent = vis;
  document.getElementById('total-count').textContent = total;
}

// Era nav
function buildEraNav(){
  const nav = document.getElementById('era-nav');
  nav.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'era-btn active';
  all.textContent = '全部';
  all.dataset.era = 'all';
  all.onclick = () => setEra('all');
  nav.appendChild(all);

  PERIOD_ORDER.forEach(p => {
    const b = document.createElement('button');
    b.className = 'era-btn';
    b.dataset.era = p;
    b.innerHTML = p + `<span class="cnt">${COUNTS[p]||0}</span>`;
    b.onclick = () => setEra(p);
    nav.appendChild(b);
  });
}

function setEra(era){
  activeEra = era;
  document.querySelectorAll('.era-btn').forEach(b => b.classList.toggle('active', b.dataset.era === era));
  render();
  if(era !== 'all'){
    const sec = document.getElementById('era-'+era);
    if(sec) sec.scrollIntoView({behavior:'smooth', block:'start'});
  } else {
    scrollTo({top:0,behavior:'smooth'});
  }
}

// Track toggles
document.querySelectorAll('.track-btn[data-t]').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.t;
    activeTracks[t] = !activeTracks[t];
    btn.classList.toggle('on-'+t, activeTracks[t]);
    if(!activeTracks.tw && !activeTracks.cn && !activeTracks.world){
      activeTracks[t] = true;
      btn.classList.add('on-'+t);
    }
    syncTrackAll();
    render();
  });
});

// Search
let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = e.target.value.trim();
    render();
  }, 250);
});

// Back to top
window.addEventListener('scroll', () => {
  document.getElementById('back-top').classList.toggle('show', scrollY > 400);
});
